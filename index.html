<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Christian Rey Baron | RCBC Hexagon Club</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --rcbc-blue: #002D72;
            --hexagon-gold: #D4AF37;
            --gold-gradient: linear-gradient(135deg, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Inter', sans-serif;
            color: white;
        }

        .luxury-bg {
            min-height: 100vh;
            background: linear-gradient(rgba(0, 45, 114, 0.85), rgba(0, 26, 65, 0.9)), 
                        url('https://www.rcbc.com/uploads/media/Homepage-Top-Banner-(Desktop)-V7-(1).png');
            background-size: cover;
            background-position: 70% center;
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .hexagon-profile {
            width: 160px;
            height: 180px;
            background: var(--gold-gradient);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            margin: 0 auto;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3));
        }

        .hexagon-inner {
            width: 100%;
            height: 100%;
            background: url('https://apollo081594.github.io/digital-card/Image.jpg') center/cover;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            background-position: top center;
        }

        .btn-luxury {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(212, 175, 55, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .btn-luxury:hover {
            background: var(--gold-gradient);
            color: #002D72;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        /* Unique Style for Save Contact Button */
        .btn-save-contact {
            background: var(--gold-gradient);
            color: #002D72;
            font-weight: 700;
            border: none;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }

        .btn-save-contact:hover {
            transform: translateY(-3px) scale(1.02);
            filter: brightness(1.1);
        }

        .qr-container {
            background: white;
            padding: 10px;
            border-radius: 16px;
            position: relative;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
            max-width: 160px;
        }

        @media (max-width: 640px) {
            .luxury-bg { background-position: 85% center; }
        }
    </style>
</head>
<body>

    <div class="luxury-bg">
        <div class="max-w-md w-full bg-opacity-10 bg-white backdrop-blur-2xl rounded-[2.5rem] p-8 shadow-2xl border border-white/20 text-center">
            
            <div class="hexagon-profile mb-6">
                <div class="hexagon-inner"></div>
            </div>

            <h1 class="text-3xl font-bold tracking-tight mb-1" style="color: #FCF6BA;">Christian Rey Baron</h1>
            <p class="text-blue-100 font-medium uppercase tracking-[0.2em] text-xs mb-3">Systems Analyst</p>
            
            <div class="flex items-center justify-center gap-2 mb-8">
                <span class="px-4 py-1.5 bg-[#D4AF37]/20 text-[#FCF6BA] rounded-full text-[10px] font-bold border border-[#D4AF37]/40 tracking-widest">
                    <i class="fas fa-hexagon-nodes mr-1"></i> HEXAGON CLUB
                </span>
                <span class="text-white/30">|</span>
                <span class="text-white font-semibold text-sm">RCBC</span>
            </div>

            <div class="grid grid-cols-1 gap-3 mb-10">
                <button onclick="downloadVCard()" class="btn-save-contact py-4 px-6 rounded-2xl flex items-center justify-center mb-2 transition-all">
                    <i class="fas fa-user-plus mr-3"></i> SAVE TO CONTACTS
                </button>

                <a href="tel:+639494404522" class="btn-luxury py-3.5 px-6 rounded-2xl flex items-center justify-between">
                    <span><i class="fas fa-phone-alt mr-3 text-[#D4AF37]"></i> Direct Call</span>
                    <i class="fas fa-chevron-right text-[10px] opacity-40"></i>
                </a>
                <a href="https://wa.me/639494404522" class="btn-luxury py-3.5 px-6 rounded-2xl flex items-center justify-between">
                    <span><i class="fab fa-whatsapp mr-3 text-[#D4AF37]"></i> WhatsApp</span>
                    <i class="fas fa-chevron-right text-[10px] opacity-40"></i>
                </a>
                <a href="viber://chat?number=639494404522" class="btn-luxury py-3.5 px-6 rounded-2xl flex items-center justify-between">
                    <span><i class="fab fa-viber mr-3 text-[#D4AF37]"></i> Viber</span>
                    <i class="fas fa-chevron-right text-[10px] opacity-40"></i>
                </a>
                <a href="mailto:crbaron@rcbc.com" class="btn-luxury py-3.5 px-6 rounded-2xl flex items-center justify-between">
                    <span><i class="fas fa-envelope mr-3 text-[#D4AF37]"></i> Email Me</span>
                    <i class="fas fa-chevron-right text-[10px] opacity-40"></i>
                </a>
            </div>

            <div class="mt-4 pt-8 border-t border-white/10 flex flex-col items-center">
                <div class="qr-container">
                    <img src="QR.png" alt="QR Code" class="w-full h-auto">
                </div>
                <p class="mt-6 text-[9px] text-white/30 uppercase tracking-widest">RCBC Hexagon Club Premium Member</p>
            </div>
        </div>
    </div>

    <script>
        function downloadVCard() {
            const vcardData = [
                "BEGIN:VCARD",
                "VERSION:3.0",
                "FN:Christian Rey Baron",
                "ORG:RCBC;Hexagon Club",
                "TITLE:Systems Analyst",
                "TEL;TYPE=CELL,VOICE:+639494404522",
                "EMAIL;TYPE=PREF,INTERNET:crbaron@rcbc.com",
                "URL:https://www.rcbc.com",
                "END:VCARD"
            ].join("\n");

            const blob = new Blob([vcardData], { type: "text/vcard" });
            const url = window.URL.createObjectURL(blob);
            const newLink = document.createElement("a");
            newLink.href = url;
            newLink.setAttribute("download", "Christian_Rey_Baron.vcf");
            document.body.appendChild(newLink);
            newLink.click();
            document.body.removeChild(newLink);
        }
    </script>
</body>
</html>
